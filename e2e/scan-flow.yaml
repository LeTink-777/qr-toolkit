appId: com.qrtoolkit.app.dev
---
# Тестовый сценарий: сканирование QR-кода → сохранение в историю

- launchApp

# Проверяем, что экран сканера отображается
- assertVisible: "Сканер"

# Переходим на экран истории
- tapOn: "История"

# Проверяем пустое состояние
- assertVisible: "История пуста"

# Возвращаемся на сканер
- tapOn: "Сканер"

# Проверяем наличие overlay с подсказкой
- assertVisible: "Наведите камеру на QR-код"
